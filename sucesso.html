<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voto confirmado!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; max-width: 380px; width: 90%; border: 1px solid #e0e0e0; }
    .circle { width: 80px; height: 80px; border-radius: 50%; background: #e8f5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; animation: pop 0.5s ease; }
    .circle svg { width: 40px; height: 40px; }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #111; }
    .info { font-size: 15px; color: #555; margin-bottom: 1.5rem; line-height: 1.5; }
    .cand-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; margin-bottom: 1.5rem; }
    .cand-lula { background: #fff0f0; color: #cc0000; }
    .cand-bols { background: #f0f4ff; color: #003087; }
    .progress-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
    .progress-fill { height: 100%; background: #2e7d32; border-radius: 2px; animation: fill 4s linear forwards; }
    @keyframes fill { from { width: 0%; } to { width: 100%; } }
    .redirect-txt { font-size: 13px; color: #aaa; }
    .btn-voltar { display: inline-block; margin-top: 1rem; padding: 10px 24px; background: #111; color: #fff; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
<div class="box">
  <div class="circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <h1>Voto confirmado!</h1>
  <div class="info" id="info">Seu voto foi registrado com sucesso.</div>
  <div id="badge"></div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
  <div class="redirect-txt">Voltando ao placar em <span id="contador">4</span> segundos...</div>
  <a href="/" class="btn-voltar">Voltar agora</a>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const cand = p.get('cand');
  const val = p.get('val');

  if (cand && val) {
    const nome = cand === 'lula' ? 'Lula' : 'Bolsonaro';
    document.getElementById('info').textContent = `Você votou ${val}x para ${nome}!`;
    const badge = document.getElementById('badge');
    badge.innerHTML = `<span class="cand-badge cand-${cand}">${nome}</span>`;
  }

  let seg = 4;
  const intervalo = setInterval(() => {
    seg--;
    document.getElementById('contador').textContent = seg;
    if (seg <= 0) {
      clearInterval(intervalo);
      window.location.href = '/';
    }
  }, 1000);
</script>
</body>
</html>
