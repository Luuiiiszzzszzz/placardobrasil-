<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voto confirmado - Voto Real</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 16px; padding: 2.5rem; text-align: center; max-width: 380px; border: 1px solid #e0e0e0; }
    .check { font-size: 48px; margin-bottom: 1rem; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #666; font-size: 15px; margin-bottom: 1.5rem; }
    a { display: inline-block; padding: 12px 28px; background: #111; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="box">
  <div class="check">✅</div>
  <h1>Voto confirmado!</h1>
  <p id="msg">Obrigado pela sua participação.</p>
  <a href="/">Ver o placar</a>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const cand = p.get('cand');
  const val = p.get('val');
  if (cand && val) {
    const nome = cand === 'lula' ? 'Lula' : 'Bolsonaro';
    document.getElementById('msg').textContent = `Você votou ${val}x para ${nome}. Obrigado!`;
  }
</script>
</body>
</html>
