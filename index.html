
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voto Real</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 28px; font-weight: 600; text-align: center; }
    .sub { text-align: center; color: #666; margin-top: 6px; margin-bottom: 2rem; font-size: 15px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.5rem; }
    .card.lula { border-top: 4px solid #cc0000; }
    .card.bols { border-top: 4px solid #003087; }
    .cname { font-size: 18px; font-weight: 600; }
    .csub { font-size: 12px; color: #888; margin-bottom: 1rem; }
    .cvotos { font-size: 30px; font-weight: 700; }
    .cvotos.lula { color: #cc0000; }
    .cvotos.bols { color: #003087; }
    .clbl { font-size: 12px; color: #888; margin-bottom: 1rem; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; min-width: 0; }
    .vbtn { padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; color: #fff; }
    .vbtn.lula { background: #cc0000; }
    .vbtn.bols { background: #003087; }
    .bar-box { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.5rem; margin-bottom: 1.5rem; }
    .bar-track { display: flex; border-radius: 8px; overflow: hidden; height: 40px; background: #f0f0f0; }
    .seg-lula { background: #cc0000; transition: width 0.5s; display: flex; align-items: center; justify-content: center; }
    .seg-bols { background: #003087; transition: width 0.5s; display: flex; align-items: center; justify-content: center; }
    .seg-pct { font-size: 13px; font-weight: 700; color: #fff; }
    .bar-legend { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .scard { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1rem; text-align: center; }
    .sval { font-size: 22px; font-weight: 700; }
    .slbl { font-size: 12px; color: #888; margin-top: 4px; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 2rem; max-width: 360px; width: 90%; text-align: center; }
    .modal h2 { font-size: 18px; margin-bottom: 8px; }
    .modal p { color: #555; font-size: 14px; margin-bottom: 1.5rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-fechar { padding: 10px 24px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Voto Real</h1>
  <p class="sub">Cada R$ 1,00 vale um voto. Quem o Brasil escolheria hoje?</p>
  <div class="cards">
    <div class="card lula">
      <div class="cname">Lula</div>
      <div class="csub">PT — 13º presidente</div>
      <div class="cvotos lula" id="lula-votos">0</div>
      <div class="clbl">votos</div>
      <div class="row">
        <input type="number" id="lula-input" placeholder="R$ valor" min="1" max="10000" />
        <button class="vbtn lula" onclick="votar('lula')">Votar</button>
      </div>
    </div>
    <div class="card bols">
      <div class="cname">Bolsonaro</div>
      <div class="csub">PL — 38º presidente</div>
      <div class="cvotos bols" id="bols-votos">0</div>
      <div class="clbl">votos</div>
      <div class="row">
        <input type="number" id="bols-input" placeholder="R$ valor" min="1" max="10000" />
        <button class="vbtn bols" onclick="votar('bolsonaro')">Votar</button>
      </div>
    </div>
  </div>
  <div class="bar-box">
    <div class="bar-track">
      <div class="seg-lula" id="bar-lula" style="width:50%"><span class="seg-pct" id="pct-lula">50%</span></div>
      <div class="seg-bols" id="bar-bols" style="width:50%"><span class="seg-pct" id="pct-bols">50%</span></div>
    </div>
    <div class="bar-legend">
      <span style="color:#cc0000;font-weight:600;">Lula</span>
      <span style="color:#003087;font-weight:600;">Bolsonaro</span>
    </div>
  </div>
  <div class="stats">
    <div class="scard"><div class="sval" id="stat-total">0</div><div class="slbl">Total de votos</div></div>
    <div class="scard"><div class="sval" id="stat-lider" style="font-size:16px;">—</div><div class="slbl">Liderando</div></div>
  </div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="spinner"></div>
    <h2 id="modal-titulo">Criando pagamento...</h2>
    <p id="modal-texto">Você será redirecionado para o Mercado Pago.</p>
    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
  </div>
</div>
<script>
  let votos = { lula: 0, bolsonaro: 0 };
  async function votar(cand) {
    const inp = document.getElementById(cand === 'lula' ? 'lula-input' : 'bols-input');
    const val = parseInt(inp.value);
    if (!val || val < 1 || val > 10000) { alert('Digite um valor entre R$ 1 e R$ 10.000'); return; }
    document.getElementById('modal').classList.add('open');
    try {
      const res = await fetch('/api/criar-pagamento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ candidato: cand, valor: val })
      });
      const data = await res.json();
      if (data.url) { fecharModal(); window.location.href = data.url; }
      else { fecharModal(); alert('Erro ao criar pagamento.'); }
    } catch (e) { fecharModal(); alert('Erro de conexão.'); }
    inp.value = '';
  }
  function fecharModal() { document.getElementById('modal').classList.remove('open'); }
  async function carregarVotos() {
    try {
      const res = await fetch('/api/votos');
      const data = await res.json();
      votos = data;
      const total = votos.lula + votos.bolsonaro;
      document.getElementById('lula-votos').textContent = votos.lula.toLocaleString('pt-BR');
      document.getElementById('bols-votos').textContent = votos.bolsonaro.toLocaleString('pt-BR');
      const pL = total === 0 ? 50 : Math.round(votos.lula / total * 100);
      const pB = 100 - pL;
      document.getElementById('bar-lula').style.width = pL + '%';
      document.getElementById('bar-bols').style.width = pB + '%';
      document.getElementById('pct-lula').textContent = pL + '%';
      document.getElementById('pct-bols').textContent = pB + '%';
      document.getElementById('stat-total').textContent = total.toLocaleString('pt-BR');
      let lider = '—';
      if (votos.lula > votos.bolsonaro) lider = 'Lula';
      else if (votos.bolsonaro > votos.lula) lider = 'Bolsonaro';
      else if (total > 0) lider = 'Empate';
      document.getElementById('stat-lider').textContent = lider;
    } catch(e) {}
  }
  carregarVotos();
  setInterval(carregarVotos, 10000);
</script>
</body>
</html>
