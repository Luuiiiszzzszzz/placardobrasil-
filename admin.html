<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Placar do Brasil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 2rem; width: 100%; max-width: 360px; }
    .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .login-box input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 10px; }
    .login-box button { width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .login-box .err { color: #cc0000; font-size: 13px; margin-top: 8px; }
    .hub { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    .hub.active { display: block; }
    .hub-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .hub-header h1 { font-size: 22px; font-weight: 600; }
    .logout { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; text-decoration: underline; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1rem; }
    .metric-val { font-size: 22px; font-weight: 700; }
    .metric-lbl { font-size: 12px; color: #888; margin-top: 4px; }
    .metric-val.green { color: #2e7d32; }
    .metric-val.red { color: #cc0000; }
    .metric-val.blue { color: #003087; }
    .section { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.25rem; margin-bottom: 1.25rem; }
    .section h2 { font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 1rem; }
    .bar-track { display: flex; border-radius: 8px; overflow: hidden; height: 36px; background: #f0f0f0; margin-bottom: 8px; }
    .seg-lula { background: #cc0000; transition: width 0.5s; display: flex; align-items: center; justify-content: center; }
    .seg-bols { background: #003087; transition: width 0.5s; display: flex; align-items: center; justify-content: center; }
    .seg-pct { font-size: 12px; font-weight: 700; color: #fff; }
    .bar-legend { display: flex; justify-content: space-between; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; font-weight: 600; font-size: 11px; color: #888; border-bottom: 1px solid #e0e0e0; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
    .badge-lula { background: #fff0f0; color: #cc0000; }
    .badge-bols { background: #f0f4ff; color: #003087; }
    .refresh-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; }
    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: 14px; }
    @media (max-width: 600px) { .metrics { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <h1>Painel Admin</h1>
    <p>Placar do Brasil — acesso restrito</p>
    <input type="password" id="senha" placeholder="Senha" onkeydown="if(event.key==='Enter')entrar()" />
    <button onclick="entrar()">Entrar</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div class="hub" id="hub">
  <div class="hub-header">
    <h1>Hub Admin</h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="refresh-btn" onclick="carregar()">Atualizar</button>
      <button class="logout" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-val" id="m-total">—</div><div class="metric-lbl">Total de votos</div></div>
    <div class="metric"><div class="metric-val green" id="m-arrecadado">—</div><div class="metric-lbl">Arrecadado</div></div>
    <div class="metric"><div class="metric-val red" id="m-lula">—</div><div class="metric-lbl">Votos Lula</div></div>
    <div class="metric"><div class="metric-val blue" id="m-bols">—</div><div class="metric-lbl">Votos Bolsonaro</div></div>
  </div>

  <div class="section">
    <h2>Distribuição</h2>
    <div class="bar-track">
      <div class="seg-lula" id="bar-lula" style="width:50%"><span class="seg-pct" id="pct-lula">50%</span></div>
      <div class="seg-bols" id="bar-bols" style="width:50%"><span class="seg-pct" id="pct-bols">50%</span></div>
    </div>
    <div class="bar-legend">
      <span style="color:#cc0000;font-weight:600;">Lula</span>
      <span style="color:#003087;font-weight:600;">Bolsonaro</span>
    </div>
  </div>

  <div class="section">
    <h2>Transações recentes</h2>
    <table>
      <thead>
        <tr>
          <th>Data/hora</th>
          <th>Candidato</th>
          <th>Valor</th>
          <th>Votos</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="4" class="empty">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const SENHA = '157Bluecase003*';

  function entrar() {
    const v = document.getElementById('senha').value;
    if (v === SENHA) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('hub').classList.add('active');
      carregar();
    } else {
      document.getElementById('err').textContent = 'Senha incorreta.';
    }
  }

  function sair() {
    document.getElementById('senha').value = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('hub').classList.remove('active');
  }

  async function carregar() {
    try {
      const res = await fetch('/api/admin-dados');
      const data = await res.json();

      const total = data.lula + data.bolsonaro;
      document.getElementById('m-total').textContent = total.toLocaleString('pt-BR');
      document.getElementById('m-arrecadado').textContent = 'R$ ' + (data.arrecadado || total).toLocaleString('pt-BR');
      document.getElementById('m-lula').textContent = data.lula.toLocaleString('pt-BR');
      document.getElementById('m-bols').textContent = data.bolsonaro.toLocaleString('pt-BR');

      const pL = total === 0 ? 50 : Math.round(data.lula / total * 100);
      const pB = 100 - pL;
      document.getElementById('bar-lula').style.width = pL + '%';
      document.getElementById('bar-bols').style.width = pB + '%';
      document.getElementById('pct-lula').textContent = pL + '%';
      document.getElementById('pct-bols').textContent = pB + '%';

      const tbody = document.getElementById('log-body');
      if (!data.transacoes || data.transacoes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">Nenhuma transação ainda.</td></tr>';
      } else {
        tbody.innerHTML = data.transacoes.map(t => `
          <tr>
            <td>${new Date(t.created_at).toLocaleString('pt-BR')}</td>
            <td><span class="badge ${t.candidato === 'lula' ? 'badge-lula' : 'badge-bols'}">${t.candidato === 'lula' ? 'Lula' : 'Bolsonaro'}</span></td>
            <td>R$ ${t.valor.toLocaleString('pt-BR')}</td>
            <td>${t.valor}</td>
          </tr>
        `).join('');
      }
    } catch(e) {
      console.error(e);
    }
  }
</script>
</body>
</html>
